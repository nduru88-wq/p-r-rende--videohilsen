<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Min familie">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b1220">

  <title>Min familie</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.13);
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --stroke:rgba(255,255,255,.14);
      --green:#27d17c;
      --red:#ff5a5a;
      --radius:24px;
      --shadow:0 10px 28px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      height:100%;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:
        radial-gradient(1100px 700px at 50% 0%, rgba(80,140,255,.25), transparent 55%),
        var(--bg);
      color:var(--text);
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    body{overflow:hidden}

    .app{
      height:100dvh;
      max-width:900px;
      margin:auto;
      padding:calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    header{text-align:center;padding-top:4px}

    .titleLine{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }

    .titleLogo{
      width:42px;
      height:42px;
      border-radius:12px;
      object-fit:contain;
      background:rgba(255,255,255,.08);
      border:1px solid var(--stroke);
      padding:5px;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
      user-select:none;
    }

    h1{
      margin:0;
      font-size:clamp(24px,6vw,34px);
      line-height:1.05;
      white-space:nowrap;
    }

    .hint{
      margin:8px 0 0;
      color:var(--muted);
      font-size:15px;
    }

    .grid{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      overflow:auto;
      padding-bottom:8px;
    }

    .card{
      background:linear-gradient(180deg,var(--card2),var(--card));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
      min-height:230px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      -webkit-tap-highlight-color:transparent;
    }

    .card:active{transform:scale(.985)}

    .avatar{
      width:min(154px,35vw);
      aspect-ratio:1;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid var(--stroke);
      overflow:hidden;
      display:grid;
      place-items:center;
      font-size:54px;
      font-weight:900;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .name{
      margin:10px 0 3px;
      text-align:center;
      font-size:clamp(18px,4.8vw,23px);
      font-weight:900;
      line-height:1.05;
    }

    .title{
      margin:0;
      color:var(--muted);
      font-size:15px;
      text-align:center;
    }

    .tag{
      margin-top:10px;
      padding:9px 13px;
      border-radius:999px;
      font-weight:900;
      font-size:14px;
      border:1px solid rgba(39,209,124,.35);
      background:rgba(39,209,124,.15);
      color:#c8ffe5;
      text-align:center;
    }

    .empty{
      grid-column:1 / -1;
      text-align:center;
      color:var(--muted);
      padding:40px 20px;
      border:1px dashed var(--stroke);
      border-radius:var(--radius);
      align-self:start;
      line-height:1.4;
    }

    .modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }

    .modalBackdrop.show{display:flex}

    .modal{
      width:min(520px,94vw);
      max-height:90dvh;
      overflow:auto;
      background:#0b1220;
      border:1px solid var(--stroke);
      border-radius:22px;
      padding:18px;
      box-shadow:0 18px 50px rgba(0,0,0,.55);
    }

    .modal h2{
      margin:0 0 14px;
      text-align:center;
    }

    label{
      display:block;
      margin:12px 0 6px;
      font-weight:800;
    }

    input{
      width:100%;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.10);
      color:white;
      padding:13px;
      border-radius:14px;
      font-size:17px;
    }

    button{
      border:0;
      border-radius:14px;
      padding:12px 14px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
    }

    .mainBtn{
      width:100%;
      background:var(--green);
      color:#062012;
    }

    .lightBtn{
      background:rgba(255,255,255,.14);
      color:white;
      border:1px solid var(--stroke);
    }

    .dangerBtn{
      background:rgba(255,90,90,.18);
      color:#ffd0d0;
      border:1px solid rgba(255,90,90,.35);
    }

    .btnRow{
      display:flex;
      gap:10px;
      margin-top:16px;
    }

    .btnRow button{flex:1}

    .listItem{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px;
      border:1px solid var(--stroke);
      border-radius:14px;
      margin-top:10px;
      background:rgba(255,255,255,.06);
    }

    .smallActions{
      display:flex;
      gap:6px;
    }

    .smallActions button{
      font-size:14px;
      padding:9px 10px;
    }

    .videoBox{
      width:100%;
      background:#050912;
      border-radius:16px;
      overflow:hidden;
      border:1px solid var(--stroke);
    }

    .videoBox video{
      display:block;
      width:100%;
      max-height:65dvh;
      background:#000;
    }

    @media(max-width:390px){
      .titleLogo{width:38px;height:38px}
      .titleLine{gap:8px}
      .card{min-height:215px}
    }
  </style>
</head>

<body>
<div class="app">
  <header>
    <div class="titleLine">
      <div class="titleLogo" id="hiddenAdminLogo">👨‍👩‍👧‍👦</div>
      <h1>Min familie</h1>
      <div class="titleLogo">▶</div>
    </div>
    <p class="hint">Tryk på et billede for at se video</p>
  </header>

  <main class="grid" id="familyGrid"></main>
</div>

<div class="modalBackdrop" id="adminModal">
  <div class="modal">
    <h2>Administrer familie</h2>
    <button class="mainBtn" id="newPersonBtn">+ Opret familiemedlem</button>
    <div id="adminList"></div>
    <button class="lightBtn" id="closeAdminBtn" style="width:100%;margin-top:14px;">Luk</button>
  </div>
</div>

<div class="modalBackdrop" id="formModal">
  <div class="modal">
    <h2 id="formTitle">Opret familiemedlem</h2>

    <input type="hidden" id="editId">

    <label>Navn</label>
    <input id="nameInput" type="text" placeholder="Fx Niels">

    <label>Titel / relation</label>
    <input id="titleInput" type="text" placeholder="Fx Søn">

    <label>Billede / thumbnail</label>
    <input id="imageInput" type="file" accept="image/*">

    <label>Video</label>
    <input id="videoInput" type="file" accept="video/*">

    <p style="color:rgba(255,255,255,.7);font-size:14px;line-height:1.4;">
      Brug korte videoer, gerne 5-20 sekunder. Store videoer kan fylde for meget på telefonen.
    </p>

    <div class="btnRow">
      <button class="mainBtn" id="saveBtn">Gem</button>
      <button class="lightBtn" id="cancelFormBtn">Annuller</button>
    </div>
  </div>
</div>

<div class="modalBackdrop" id="videoModal">
  <div class="modal">
    <h2 id="videoTitle">Video</h2>

    <div class="videoBox">
      <video id="personVideo" controls playsinline preload="metadata"></video>
    </div>

    <button class="mainBtn" id="closeVideoBtn" style="margin-top:14px;">Luk video</button>
  </div>
</div>

<script>
const STORAGE_KEY = "familieVideoPersonerV1";
const DB_NAME = "familieVideoDB";
const DB_VERSION = 1;
const STORE_NAME = "videos";

const familyGrid = document.getElementById("familyGrid");
const adminModal = document.getElementById("adminModal");
const formModal = document.getElementById("formModal");
const videoModal = document.getElementById("videoModal");

const hiddenAdminLogo = document.getElementById("hiddenAdminLogo");
const closeAdminBtn = document.getElementById("closeAdminBtn");
const newPersonBtn = document.getElementById("newPersonBtn");
const adminList = document.getElementById("adminList");

const formTitle = document.getElementById("formTitle");
const editId = document.getElementById("editId");
const nameInput = document.getElementById("nameInput");
const titleInput = document.getElementById("titleInput");
const imageInput = document.getElementById("imageInput");
const videoInput = document.getElementById("videoInput");
const saveBtn = document.getElementById("saveBtn");
const cancelFormBtn = document.getElementById("cancelFormBtn");

const videoTitle = document.getElementById("videoTitle");
const personVideo = document.getElementById("personVideo");
const closeVideoBtn = document.getElementById("closeVideoBtn");

let people = loadPeople();
let tapCount = 0;
let tapTimer = null;
let selectedImageData = null;
let selectedVideoFile = null;

function loadPeople(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }catch(e){
    return [];
  }
}

function savePeople(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(people));
}

function makeId(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function escapeHtml(str){
  return String(str || "").replace(/[&<>"']/g, function(m){
    return ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    })[m];
  });
}

function openDB(){
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = () => {
      const db = request.result;
      if(!db.objectStoreNames.contains(STORE_NAME)){
        db.createObjectStore(STORE_NAME);
      }
    };

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function saveVideo(id, file){
  const db = await openDB();

  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put(file, id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function getVideo(id){
  const db = await openDB();

  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const request = tx.objectStore(STORE_NAME).get(id);

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function deleteVideo(id){
  const db = await openDB();

  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

function imageFileToDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

imageInput.addEventListener("change", async () => {
  const file = imageInput.files[0];
  if(!file) return;

  selectedImageData = await imageFileToDataURL(file);
});

videoInput.addEventListener("change", () => {
  selectedVideoFile = videoInput.files[0] || null;
});

function renderPeople(){
  familyGrid.innerHTML = "";

  if(people.length === 0){
    familyGrid.innerHTML = `
      <div class="empty">
        <h2>Ingen personer endnu</h2>
        <p>Tryk 3 gange på familie-ikonet øverst til venstre for at oprette personer.</p>
      </div>
    `;
    return;
  }

  people.forEach(person => {
    const card = document.createElement("div");
    card.className = "card";

    const avatar = person.image
      ? `<div class="avatar"><img src="${person.image}" alt="${escapeHtml(person.name)}"></div>`
      : `<div class="avatar">${escapeHtml(person.name.charAt(0).toUpperCase())}</div>`;

    card.innerHTML = `
      ${avatar}
      <div>
        <p class="name">${escapeHtml(person.name)}</p>
        <p class="title">${escapeHtml(person.title)}</p>
        <div class="tag">▶ AFSPIL VIDEO</div>
      </div>
    `;

    card.addEventListener("click", () => openPersonVideo(person.id));

    familyGrid.appendChild(card);
  });
}

function renderAdminList(){
  adminList.innerHTML = "";

  if(people.length === 0){
    adminList.innerHTML = `
      <p style="text-align:center;color:rgba(255,255,255,.72);">
        Ingen personer oprettet endnu.
      </p>
    `;
    return;
  }

  people.forEach(person => {
    const item = document.createElement("div");
    item.className = "listItem";

    item.innerHTML = `
      <div>
        <strong>${escapeHtml(person.name)}</strong><br>
        <span style="color:rgba(255,255,255,.7);font-size:14px;">
          ${escapeHtml(person.title)}
        </span>
      </div>
      <div class="smallActions">
        <button class="lightBtn">Ret</button>
        <button class="dangerBtn">Slet</button>
      </div>
    `;

    item.querySelector(".lightBtn").addEventListener("click", () => {
      adminModal.classList.remove("show");
      openEditForm(person.id);
    });

    item.querySelector(".dangerBtn").addEventListener("click", async () => {
      if(confirm("Vil du slette " + person.name + "?")){
        people = people.filter(p => p.id !== person.id);
        savePeople();
        await deleteVideo(person.id);
        renderPeople();
        renderAdminList();
      }
    });

    adminList.appendChild(item);
  });
}

function openAdmin(){
  renderAdminList();
  adminModal.classList.add("show");
}

function openNewForm(){
  formTitle.textContent = "Opret familiemedlem";
  editId.value = "";
  nameInput.value = "";
  titleInput.value = "";
  imageInput.value = "";
  videoInput.value = "";
  selectedImageData = null;
  selectedVideoFile = null;
  formModal.classList.add("show");
}

function openEditForm(id){
  const person = people.find(p => p.id === id);
  if(!person) return;

  formTitle.textContent = "Rediger familiemedlem";
  editId.value = person.id;
  nameInput.value = person.name;
  titleInput.value = person.title;
  imageInput.value = "";
  videoInput.value = "";
  selectedImageData = null;
  selectedVideoFile = null;
  formModal.classList.add("show");
}

async function saveForm(){
  const name = nameInput.value.trim();
  const title = titleInput.value.trim();
  const id = editId.value;

  if(!name){
    alert("Skriv et navn.");
    return;
  }

  if(!title){
    alert("Skriv en titel/relation.");
    return;
  }

  if(id){
    const person = people.find(p => p.id === id);
    if(!person) return;

    person.name = name;
    person.title = title;

    if(selectedImageData){
      person.image = selectedImageData;
    }

    if(selectedVideoFile){
      await saveVideo(id, selectedVideoFile);
      person.hasVideo = true;
    }
  }else{
    const newId = makeId();

    const person = {
      id: newId,
      name,
      title,
      image: selectedImageData,
      hasVideo: !!selectedVideoFile
    };

    people.push(person);

    if(selectedVideoFile){
      await saveVideo(newId, selectedVideoFile);
    }
  }

  savePeople();
  renderPeople();
  renderAdminList();
  formModal.classList.remove("show");
}

async function openPersonVideo(id){
  const person = people.find(p => p.id === id);
  if(!person) return;

  const file = await getVideo(id);

  if(!file){
    alert("Der er ikke valgt en video til " + person.name + ".");
    return;
  }

  if(personVideo.src){
    URL.revokeObjectURL(personVideo.src);
  }

  videoTitle.textContent = person.name + " - " + person.title;
  personVideo.src = URL.createObjectURL(file);
  videoModal.classList.add("show");

  try{
    personVideo.currentTime = 0;
    const playPromise = personVideo.play();

    if(playPromise && typeof playPromise.catch === "function"){
      playPromise.catch(() => {});
    }
  }catch(e){}
}

function closeVideo(){
  try{
    personVideo.pause();
    personVideo.currentTime = 0;
  }catch(e){}

  if(personVideo.src){
    URL.revokeObjectURL(personVideo.src);
    personVideo.removeAttribute("src");
    personVideo.load();
  }

  videoModal.classList.remove("show");
}

hiddenAdminLogo.addEventListener("click", () => {
  tapCount++;

  if(tapTimer){
    clearTimeout(tapTimer);
  }

  tapTimer = setTimeout(() => {
    tapCount = 0;
  }, 1200);

  if(tapCount >= 3){
    tapCount = 0;
    clearTimeout(tapTimer);
    openAdmin();
  }
});

closeAdminBtn.addEventListener("click", () => {
  adminModal.classList.remove("show");
});

newPersonBtn.addEventListener("click", () => {
  adminModal.classList.remove("show");
  openNewForm();
});

saveBtn.addEventListener("click", saveForm);

cancelFormBtn.addEventListener("click", () => {
  formModal.classList.remove("show");
});

closeVideoBtn.addEventListener("click", closeVideo);

personVideo.addEventListener("ended", closeVideo);

renderPeople();
</script>
</body>
</html>
